<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Simulación — Arrecife</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  min-height:100%;
}

body{
  background:#000;
  color:white;
  font-family:Arial, sans-serif;
  overflow-x:hidden;
  min-height:100vh;
  padding:60px 20px;
  position:relative;
}

/* =========================
   OCEANO
========================= */

.ocean{
  position:fixed;
  inset:0;
  overflow:hidden;
  z-index:0;
  pointer-events:none;
}

.wave{
  position:absolute;
  width:220%;
  height:220%;
  left:-60%;
  top:-60%;

  background:
    radial-gradient(
      circle at center,
      rgba(126,231,255,0.045),
      transparent 60%
    );

  animation:rotateWave 50s linear infinite;
}

.wave2{
  animation-duration:80s;
  opacity:0.5;
  transform:scale(1.25);
}

.wave3{
  animation-duration:120s;
  opacity:0.25;
  transform:scale(1.45);
}

@keyframes rotateWave{

  from{
    transform:rotate(0deg);
  }

  to{
    transform:rotate(360deg);
  }

}

/* =========================
   PARTICULAS
========================= */

.particles{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  overflow:hidden;
}

.particles span{

  position:absolute;

  width:2px;
  height:2px;

  background:white;

  border-radius:50%;

  opacity:0.08;

  animation:floatParticle linear infinite;

}

@keyframes floatParticle{

  from{
    transform:translateY(100vh);
  }

  to{
    transform:translateY(-120vh);
  }

}

/* =========================
   CRIATURAS
========================= */

.deep-sea{

  position:fixed;
  inset:0;
  overflow:hidden;
  pointer-events:none;
  z-index:0;

}

/* PEZ */

.creature1{

  position:absolute;

  width:180px;
  height:70px;

  border:1px solid rgba(126,231,255,0.18);

  border-radius:50%;

  top:18%;
  left:-250px;

  opacity:0.18;

  filter:blur(0px);

  animation:swim1 40s linear infinite;

}

.creature1::after{

  content:"";

  position:absolute;

  right:-28px;
  top:18px;

  width:45px;
  height:30px;

  border:1px solid rgba(126,231,255,0.18);

  clip-path:polygon(0 50%,100% 0,100% 100%);

}

/* BALLENA */

.creature2{

  position:absolute;

  width:420px;
  height:120px;

  border:1px solid rgba(126,231,255,0.14);

  border-radius:50%;

  top:65%;
  right:-500px;

  opacity:0.14;

  filter:blur(0px);

  animation:swim2 85s linear infinite;

}

.creature2::before{

  content:"";

  position:absolute;

  left:-45px;
  top:38px;

  width:70px;
  height:40px;

  border:1px solid rgba(126,231,255,0.14);

  clip-path:polygon(100% 50%,0 0,0 100%);

}

/* RAYA */

.creature3{

  position:absolute;

  width:240px;
  height:240px;

  border:1px solid rgba(126,231,255,0.12);

  border-radius:40%;

  transform:rotate(45deg);

  top:40%;
  left:-350px;

  opacity:0.12;

  filter:blur(0px);

  animation:swim3 65s linear infinite;

}

@keyframes swim1{

  from{
    transform:
      translateX(0px)
      translateY(0px);
  }

  to{
    transform:
      translateX(160vw)
      translateY(25px);
  }

}

@keyframes swim2{

  from{
    transform:
      translateX(0px)
      translateY(0px);
  }

  to{
    transform:
      translateX(-180vw)
      translateY(-30px);
  }

}

@keyframes swim3{

  from{
    transform:
      translateX(0px)
      rotate(45deg);
  }

  to{
    transform:
      translateX(180vw)
      rotate(65deg);
  }

}

/* =========================
   CONTENIDO
========================= */

.container{
  max-width:1200px;
  margin:auto;
  position:relative;
  z-index:2;
}

.header{
  text-align:center;
  margin-bottom:70px;
}

.logo{
  letter-spacing:8px;
  font-size:12px;
  opacity:0.6;
  margin-bottom:25px;
}

h1{
  font-weight:normal;
  font-size:42px;
  margin-bottom:15px;
  letter-spacing:2px;
}

.sub{
  opacity:0.5;
  line-height:1.8;
  font-size:14px;
}

.controls{
  text-align:center;
  margin-bottom:35px;
}

/* =========================
   SELECTS
========================= */

select{

  appearance:none;
  -webkit-appearance:none;
  -moz-appearance:none;

  background:#050505;

  border:1px solid rgba(255,255,255,0.12);

  color:white;

  padding:12px 18px;

  font-size:14px;

  letter-spacing:1px;

  transition:0.3s;

  cursor:pointer;

  border-radius:2px;

}

select option{

  background:#050505 !important;
  color:white !important;

}

select:hover{

  border-color:#7ee7ff;

  box-shadow:
    0 0 12px rgba(126,231,255,0.35);

  color:#dffaff;

}

select:focus{

  outline:none;

  border-color:#7ee7ff;

  box-shadow:
    0 0 18px rgba(126,231,255,0.45);

}

/* =========================
   PLAYERS
========================= */

.players{

  display:grid;

  grid-template-columns:
    repeat(auto-fit, minmax(220px, 1fr));

  gap:25px;

  margin-bottom:60px;

}

.player-card{

  border:1px solid rgba(255,255,255,0.08);

  padding:25px;

  background:rgba(255,255,255,0.02);

  backdrop-filter:blur(5px);

  transition:0.3s;

  position:relative;

  overflow:hidden;

}

.player-card::before{

  content:"";

  position:absolute;

  inset:0;

  background:
    linear-gradient(
      120deg,
      transparent,
      rgba(126,231,255,0.03),
      transparent
    );

  transform:translateX(-100%);

  transition:1.2s;

}

.player-card:hover::before{

  transform:translateX(100%);

}

.player-card:hover{

  border-color:#7ee7ff55;

  box-shadow:
    0 0 25px rgba(126,231,255,0.08);

  transform:translateY(-2px);

}

.player-title{

  margin-bottom:25px;

  letter-spacing:3px;

  font-size:12px;

  opacity:0.6;

}

.field{
  margin-bottom:18px;
}

.field label{

  display:block;

  margin-bottom:8px;

  font-size:11px;

  letter-spacing:2px;

  opacity:0.4;

}

.field select{
  width:100%;
}

/* =========================
   BOTON
========================= */

button{

  display:block;

  margin:0 auto 70px;

  background:transparent;

  border:1px solid rgba(255,255,255,0.25);

  color:white;

  padding:16px 45px;

  letter-spacing:3px;

  cursor:pointer;

  transition:0.3s;

  font-size:12px;

}

button:hover{

  background:#7ee7ff;

  color:black;

  box-shadow:
    0 0 30px rgba(126,231,255,0.35);

}

/* =========================
   RESULTADOS
========================= */

.resultado{

  border-top:1px solid rgba(255,255,255,0.1);

  padding-top:60px;

  max-width:800px;

  margin:auto;

}

.bloque{
  margin-bottom:45px;
}

.bloque h2{

  font-weight:normal;

  font-size:13px;

  letter-spacing:4px;

  opacity:0.5;

  margin-bottom:15px;

}

.bloque p{

  font-size:20px;

  line-height:1.8;

}

.evento{

  margin-top:15px;

  padding:18px;

  border:1px solid rgba(126,231,255,0.15);

  background:rgba(126,231,255,0.05);

  letter-spacing:1px;

  box-shadow:
    0 0 25px rgba(126,231,255,0.08);

}

.paso{

  margin-bottom:18px;

  opacity:0.75;

  line-height:1.8;

}

.highlight{
  font-size:28px;
}

/* =========================
   MOBILE
========================= */

@media(max-width:700px){

  h1{
    font-size:30px;
  }

}

</style>

</head>

<body>

<div class="ocean">

  <div class="wave"></div>
  <div class="wave wave2"></div>
  <div class="wave wave3"></div>

</div>

<div class="particles" id="particles"></div>

<div class="deep-sea">

  <div class="creature1"></div>
  <div class="creature2"></div>
  <div class="creature3"></div>

</div>

<div class="container">

  <div class="header">

    <div class="logo">
      ARRECIFE
    </div>

    <h1>Simulación</h1>

    <div class="sub">
      Observá qué ocurre cuando el grupo se divide.
    </div>

  </div>

  <div class="controls">

    <select id="cantidadJugadores">
      <option value="3">3 jugadores</option>
      <option value="4">4 jugadores</option>
      <option value="5" selected>5 jugadores</option>
      <option value="6">6 jugadores</option>
      <option value="7">7 jugadores</option>
    </select>

  </div>

  <div class="controls" style="margin-top:-10px; margin-bottom:50px;">

    <select id="amuleto">
      <option value="Algas">Amuleto → Algas</option>
      <option value="Corales">Amuleto → Corales</option>
    </select>

  </div>

  <div class="players" id="playersContainer"></div>

  <button onclick="calcular()">
    ANALIZAR RONDA
  </button>

  <div class="resultado" id="resultado"></div>

</div>

<script>

/* PARTICULAS */

const particlesContainer =
document.getElementById("particles");

for(let i=0;i<45;i++){

  const p = document.createElement("span");

  p.style.left =
    Math.random()*100 + "%";

  p.style.animationDuration =
    (20 + Math.random()*40) + "s";

  p.style.animationDelay =
    (-Math.random()*50) + "s";

  p.style.opacity =
    Math.random()*0.12;

  particlesContainer.appendChild(p);

}

/* JUGADORES */

const playersContainer =
document.getElementById("playersContainer");

const cantidadJugadores =
document.getElementById("cantidadJugadores");

function crearJugadores(){

  playersContainer.innerHTML = "";

  const cantidad =
    parseInt(cantidadJugadores.value);

  for(let i=1; i<=cantidad; i++){

    const card = document.createElement("div");

    card.className = "player-card";

    card.innerHTML = `

      <div class="player-title">
        JUGADOR ${i}
      </div>

      <div class="field">
        <label>EQUIPO</label>

        <select class="equipo">
          <option value="Algas">Algas</option>
          <option value="Corales">Corales</option>
        </select>
      </div>

      <div class="field">
        <label>SIGNO</label>

        <select class="signo">
          <option value="+">+</option>
          <option value="-">-</option>
        </select>
      </div>

      <div class="field">
        <label>VALOR</label>

        <select class="valor">

          ${Array.from({length:5}, (_,k)=>`

            <option value="${k+1}">
              ${k+1}
            </option>

          `).join("")}

        </select>

      </div>

    `;

    playersContainer.appendChild(card);

  }

}

cantidadJugadores.addEventListener(
  "change",
  crearJugadores
);

crearJugadores();

/* CALCULO */

function calcular(){

  const cards =
    document.querySelectorAll(".player-card");

  const jugadores = [];

  cards.forEach(card=>{

    const equipo =
      card.querySelector(".equipo").value;

    const signo =
      card.querySelector(".signo").value;

    const valor =
      parseInt(card.querySelector(".valor").value);

    jugadores.push({

      equipo,
      signo,
      valor,

      aporte:
        signo === "+"
        ? valor
        : -valor

    });

  });

  const vivos = jugadores.length;

  const algas =
    jugadores.filter(j=>j.equipo==="Algas");

  const corales =
    jugadores.filter(j=>j.equipo==="Corales");

  if(algas.length === 0 || corales.length === 0){

    document.getElementById("resultado").innerHTML = `

      <div class="bloque">
        <h2>RESULTADO</h2>

        <p class="highlight">
          Todos eligieron el mismo equipo.
        </p>
      </div>

      <div class="evento">
        La ronda se reinicia.
      </div>

    `;

    return;

  }

  const amuleto =
    document.getElementById("amuleto").value;

  let mayoria;
  let minoria;

  if(
    algas.length > corales.length ||
    (algas.length === corales.length &&
    amuleto === "Algas")
  ){

    mayoria = {
      nombre:"Algas",
      jugadores:algas
    };

    minoria = {
      nombre:"Corales",
      jugadores:corales
    };

  }else{

    mayoria = {
      nombre:"Corales",
      jugadores:corales
    };

    minoria = {
      nombre:"Algas",
      jugadores:algas
    };

  }

  const sumaMayoriaReal =
    mayoria.jugadores
    .reduce((a,b)=>a+b.aporte,0);

  const sumaMinoriaReal =
    minoria.jugadores
    .reduce((a,b)=>a+b.aporte,0);

  const sumaMayoria =
    Math.abs(sumaMayoriaReal);

  const sumaMinoria =
    Math.abs(sumaMinoriaReal);

  /* MAREA */

  if(sumaMayoria === 0){

    document.getElementById("resultado").innerHTML = `

      <div class="bloque">

        <h2>MAYORÍA</h2>

        <p>
          ${mayoria.nombre}
          — ${mayoria.jugadores.length} jugadores
        </p>

      </div>

      <div class="bloque">

        <h2>MINORÍA</h2>

        <p>
          ${minoria.nombre}
          — ${minoria.jugadores.length} jugadores
        </p>

      </div>

      <div class="bloque">

        <h2>SUMA MAYORÍA</h2>

        <p class="highlight">
          ${sumaMayoriaReal}
        </p>

      </div>

      <div class="evento">

        MAREA ACTIVADA
        <br><br>

        La Minoría recupera 2 HP.

      </div>

      <div class="bloque">

        <h2>RESULTADO FINAL</h2>

        <p class="highlight">
          La Minoría recupera 2 HP.
        </p>

      </div>

    `;

    return;

  }

  /* DAÑO NORMAL */

  let dañoBase;

  if(sumaMayoria > vivos){

    dañoBase = "Mayoría";

  }else{

    dañoBase = "Minoría";

  }

  let tornado = false;

  let dañoFinal = dañoBase;

  if(sumaMinoria > sumaMayoria){

    tornado = true;

    dañoFinal =
      dañoBase === "Mayoría"
      ? "Minoría"
      : "Mayoría";

  }

  let html = `

    <div class="bloque">

      <h2>MAYORÍA</h2>

      <p>
        ${mayoria.nombre}
        — ${mayoria.jugadores.length} jugadores
      </p>

    </div>

    <div class="bloque">

      <h2>MINORÍA</h2>

      <p>
        ${minoria.nombre}
        — ${minoria.jugadores.length} jugadores
      </p>

    </div>

    <div class="bloque">

      <h2>SUMA MAYORÍA</h2>

      <p class="highlight">
        ${sumaMayoriaReal}
      </p>

    </div>

    <div class="bloque">

      <h2>SUMA MINORÍA</h2>

      <p class="highlight">
        ${sumaMinoriaReal}
      </p>

    </div>

    <div class="bloque">

      <h2>ANÁLISIS</h2>

      <div class="paso">
        Hay ${vivos} jugadores vivos.
      </div>

      <div class="paso">
        La suma de la Mayoría es ${sumaMayoria}.
      </div>

      <div class="paso">
        El daño inicialmente iría hacia la ${dañoBase}.
      </div>

  `;

  if(tornado){

    html += `

      <div class="evento">

        TORNADO ACTIVADO
        <br><br>

        La Minoría altera el resultado.

      </div>

    `;

  }

  html += `

    </div>

    <div class="bloque">

      <h2>RESULTADO FINAL</h2>

      <p class="highlight">
        La ${dañoFinal}
        recibe ${sumaMayoria} de daño.
      </p>

    </div>

  `;

  document.getElementById("resultado").innerHTML =
    html;

}

/* PARTICULAS CLICK */

function createParticle(x,y){

  const particle =
    document.createElement("div");

  particle.style.position = "fixed";

  particle.style.left = x + "px";

  particle.style.top = y + "px";

  particle.style.width = "6px";

  particle.style.height = "6px";

  particle.style.borderRadius = "50%";

  particle.style.background = "#7ee7ff";

  particle.style.pointerEvents = "none";

  particle.style.opacity = "1";

  particle.style.zIndex = "9999";

  particle.style.boxShadow =
    "0 0 12px rgba(126,231,255,0.9)";

  document.body.appendChild(particle);

  particle.animate([

    {
      transform:"translate(-50%, -50%) scale(1)",
      opacity:1
    },

    {
      transform:"translate(-50%, -80px) scale(0)",
      opacity:0
    }

  ],{

    duration:900,
    easing:"ease-out"

  });

  setTimeout(()=>{
    particle.remove();
  },900);

}

document.addEventListener("click", e=>{

  createParticle(
    e.clientX,
    e.clientY
  );

});

document.addEventListener("touchstart", e=>{

  const t = e.touches[0];

  createParticle(
    t.clientX,
    t.clientY
  );

},{ passive:true });

</script>

</body>
</html>
